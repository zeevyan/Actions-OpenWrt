name: Update Checker

env:
  REPO_URL: https://github.com/immortalwrt/immortalwrt
  REPO_BRANCH: v24.10.5  # 锁定最新稳定版分支
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true # 强制使用 Node 24 环境

on:
  workflow_dispatch:
#  schedule:
#   - cron: 0 */18 * * * # 每18小时自动检查一次

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
    - name: Get Commit Hash
      id: getHash
      run: |
        # 使用 ls-remote 毫秒级获取最新 Hash，无需克隆仓库
        commitHash=$(git ls-remote $REPO_URL $REPO_BRANCH | awk '{print $1}')
        echo "commitHash=$commitHash" >> $GITHUB_OUTPUT

    - name: Compare Commit Hash
      id: cacheHash
      uses: actions/cache@v4 # 升级至 v4 适配最新 Node 环境
      with:
        path: .commitHash
        key: v24-commitHash-${{ steps.getHash.outputs.commitHash }}

    - name: Save New Commit Hash
      if: steps.cacheHash.outputs.cache-hit != 'true'
      run: |
        echo ${{ steps.getHash.outputs.commitHash }} | tee .commitHash

    - name: Trigger build
      if: steps.cacheHash.outputs.cache-hit != 'true'
      uses: peter-evans/repository-dispatch@v3 # 升级至 v3 适配最新环境
      with:
        token: ${{ secrets.GH_PAT }}
        event-type: Source Code Update

    - name: Delete workflow runs
      uses: Mattraks/delete-workflow-runs@v2
      with:
        retain_days: 1
        keep_minimum_runs: 2
